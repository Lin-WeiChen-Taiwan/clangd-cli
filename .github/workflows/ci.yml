name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install LLVM tools (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang clangd cmake ninja-build

      - name: Install LLVM tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM tools (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm ninja --yes --no-progress

      - run: npm ci
      - run: npm run verify
